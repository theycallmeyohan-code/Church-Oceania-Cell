<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>남아메리카 공동체 교구관리</title>
    <meta name="description" content="셀별 성도 관리와 심방 기록을 위한 관리자 페이지">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="남아메리카 공동체">
    <meta property="og:title" content="남아메리카 공동체 교구관리">
    <meta property="og:description" content="셀별 성도 관리와 심방 기록을 위한 관리자 페이지">
    <meta property="og:url" content="https://seosanch-cell.pages.dev/">
    <meta property="og:image" content="https://seosanch-cell.pages.dev/share-card.png?v=2">
    <meta property="og:image:secure_url" content="https://seosanch-cell.pages.dev/share-card.png?v=2">
    <meta property="og:image:alt" content="남아메리카 공동체 교구관리">
    <meta property="og:locale" content="ko_KR">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="남아메리카 공동체 교구관리">
    <meta name="twitter:description" content="셀별 성도 관리와 심방 기록을 위한 관리자 페이지">
    <meta name="twitter:image" content="https://seosanch-cell.pages.dev/share-card.png?v=2">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="icon" href="/favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="stylesheet" href="./styles.css?v=mobile-cell-tabs-1">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">남아메리카 공동체</p>
          <h1>교구관리</h1>
        </div>
        <div class="top-actions">
          <label class="search-box">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="m21 21-4.3-4.3m1.3-5.2a6.5 6.5 0 1 1-13 0 6.5 6.5 0 0 1 13 0Z"></path>
            </svg>
            <input id="searchInput" type="search" placeholder="전체 검색: 이름, 전화, 자녀, 가족메모">
          </label>
          <button class="icon-button text-button subtle visit-dates-button" id="visitDatesBtn" type="button" title="날짜별 심방내역" aria-label="날짜별 심방내역">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <rect x="3" y="4" width="18" height="18" rx="2"></rect>
              <path d="M16 2v4M8 2v4M3 10h18"></path>
            </svg>
            <span>심방일자</span>
          </button>
          <button class="icon-button text-button subtle settings-button" id="settingsBtn" type="button" title="설정" aria-label="설정">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 15.5A3.5 3.5 0 1 0 12 8a3.5 3.5 0 0 0 0 7.5Z"></path>
              <path d="M19.4 15a1.8 1.8 0 0 0 .36 2l.06.06a2.1 2.1 0 0 1-2.97 2.97l-.06-.06a1.8 1.8 0 0 0-2-.36 1.8 1.8 0 0 0-1.1 1.66V21a2.1 2.1 0 0 1-4.2 0v-.09a1.8 1.8 0 0 0-1.1-1.66 1.8 1.8 0 0 0-2 .36l-.06.06a2.1 2.1 0 0 1-2.97-2.97l.06-.06a1.8 1.8 0 0 0 .36-2 1.8 1.8 0 0 0-1.66-1.1H3a2.1 2.1 0 0 1 0-4.2h.09a1.8 1.8 0 0 0 1.66-1.1 1.8 1.8 0 0 0-.36-2l-.06-.06a2.1 2.1 0 0 1 2.97-2.97l.06.06a1.8 1.8 0 0 0 2 .36H9.5A1.8 1.8 0 0 0 10.6 3V3a2.1 2.1 0 0 1 4.2 0v.09a1.8 1.8 0 0 0 1.1 1.66 1.8 1.8 0 0 0 2-.36l.06-.06a2.1 2.1 0 0 1 2.97 2.97l-.06.06a1.8 1.8 0 0 0-.36 2V9.5A1.8 1.8 0 0 0 21 10.6h.09a2.1 2.1 0 0 1 0 4.2H21a1.8 1.8 0 0 0-1.6.2Z"></path>
            </svg>
            <span>설정</span>
          </button>
          <button class="icon-button text-button primary" id="addMemberBtn" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 5v14M5 12h14"></path>
            </svg>
            새 성도
          </button>
        </div>
      </header>

      <main class="workspace" id="workspace">
        <aside class="cell-rail">
          <div class="rail-title">셀</div>
          <div id="cellTabs" class="cell-tabs"></div>
          <label class="archive-toggle">
            <input id="showArchived" type="checkbox">
            <span>보관 포함</span>
          </label>
        </aside>

        <section class="sheet">
          <div class="sheet-head">
            <div>
              <p id="cellMeta" class="cell-meta"></p>
              <h2 id="cellTitle"></h2>
            </div>
            <div class="sheet-stats">
              <span id="activeCount">0명</span>
              <span id="archivedCount">보관 0명</span>
            </div>
          </div>
          <div id="memberGrid" class="member-grid"></div>
        </section>

        <aside class="detail-panel" id="detailPanel" aria-live="polite">
          <div class="empty-detail" id="emptyDetail">
            <div class="empty-mark">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M20 21a8 8 0 0 0-16 0"></path>
                <circle cx="12" cy="7" r="4"></circle>
              </svg>
            </div>
            <p>성도를 선택하세요</p>
          </div>

          <form id="memberForm" class="member-form hidden">
            <div class="panel-head">
              <button class="icon-button text-button subtle mobile-back-button" id="backToListBtn" type="button" title="명단으로" aria-label="명단으로">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M19 12H5M12 19l-7-7 7-7"></path>
                </svg>
                <span>명단</span>
              </button>
              <div class="panel-title">
                <p id="formMode" class="hidden-title">상세</p>
                <h3 id="formTitle" class="hidden-title">성도 정보</h3>
                <label class="icon-button photo-button photo-change-button" title="사진 추가/수정" aria-label="사진 추가/수정">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <rect x="3" y="5" width="18" height="14" rx="2"></rect>
                    <circle cx="8.5" cy="10.5" r="1.5"></circle>
                    <path d="m21 15-4.5-4.5L5 19"></path>
                  </svg>
                  <span>사진 추가/수정</span>
                  <input id="photoInput" type="file" accept="image/*">
                </label>
              </div>
              <button class="icon-button text-button subtle" id="closePanelBtn" type="button" title="닫기" aria-label="닫기">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M18 6 6 18M6 6l12 12"></path>
                </svg>
                <span>닫기</span>
              </button>
            </div>

            <div class="portrait-editor">
              <div id="photoPreview" class="portrait large"></div>
              <div class="identity-grid">
                <label>이름<input id="memberName" required></label>
                <label>직분<input id="memberTitle"></label>
                <label>셀<select id="memberCell"></select></label>
                <label>역할<select id="memberRole"></select></label>
                <label class="wide">교회등록일<input id="memberRegisteredAt" type="date"></label>
              </div>
            </div>

            <div class="form-grid">
              <label>전화<input id="memberPhone" inputmode="tel"></label>
              <label>집전화<input id="memberHomePhone" inputmode="tel"></label>
              <label>생년월일<input id="memberBirth" type="date"></label>
              <label class="age-field">나이
                <div class="age-with-calendar">
                  <input id="memberAge" class="age-output" readonly tabindex="-1">
                  <span id="memberCalendar" class="calendar-badge hidden">음력</span>
                </div>
              </label>
              <label class="wide">주소<input id="memberAddress"></label>
              <label class="wide">가족/메모<textarea id="memberMemo" rows="3"></textarea></label>
            </div>

            <div class="button-row">
              <button class="icon-button text-button primary" type="submit">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z"></path>
                  <path d="M17 21v-8H7v8M7 3v5h8"></path>
                </svg>
                저장
              </button>
              <button class="icon-button text-button warning" id="archiveBtn" type="button">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M21 8H3l2-4h14l2 4ZM5 8v11h14V8M10 12h4"></path>
                </svg>
                보관
              </button>
              <button class="icon-button text-button subtle hidden" id="restoreBtn" type="button">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M3 12a9 9 0 1 0 3-6.7M3 4v6h6"></path>
                </svg>
                복구
              </button>
              <button class="icon-button text-button danger" id="deleteBtn" type="button">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M3 6h18M8 6V4h8v2m-9 0 1 14h8l1-14"></path>
                </svg>
                완전 삭제
              </button>
            </div>

            <section class="visit-section">
              <div class="section-head">
                <h4>심방내역</h4>
                <span id="visitCount">0건</span>
              </div>
              <div class="visit-entry">
                <input id="visitDate" type="date">
                <select id="visitType">
                  <option>전화</option>
                  <option>심방</option>
                  <option>상담</option>
                  <option>기도</option>
                </select>
                <textarea id="visitSummary" rows="3" placeholder="요약"></textarea>
                <input id="visitPrayer" placeholder="기도제목">
                <input id="visitAction" placeholder="후속 조치">
                <button class="icon-button text-button" id="addVisitBtn" type="button">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 5v14M5 12h14"></path>
                  </svg>
                  추가
                </button>
              </div>
              <div id="visitList" class="visit-list"></div>
            </section>
          </form>
        </aside>
      </main>
    </div>



    <div class="modal-backdrop hidden" id="visitDatesModal" aria-hidden="true">
      <section class="visit-dates-dialog" aria-labelledby="visitDatesTitle">
        <div class="settings-head">
          <div>
            <p class="eyebrow">심방내역</p>
            <h2 id="visitDatesTitle">날짜별 심방내역</h2>
          </div>
          <button class="icon-button text-button subtle" id="visitDatesCloseBtn" type="button" title="닫기" aria-label="닫기">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M18 6 6 18M6 6l12 12"></path>
            </svg>
            <span>닫기</span>
          </button>
        </div>
        <div id="visitDateChips" class="visit-date-chips"></div>
        <div id="visitDateEntries" class="visit-date-entries"></div>
      </section>
    </div>

    <div class="modal-backdrop hidden" id="settingsModal" aria-hidden="true">
      <form id="settingsForm" class="settings-dialog">
        <div class="settings-head">
          <div>
            <p class="eyebrow">설정</p>
            <h2>비밀번호 변경</h2>
          </div>
          <button class="icon-button text-button subtle" id="settingsCloseBtn" type="button" title="닫기" aria-label="닫기">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M18 6 6 18M6 6l12 12"></path>
            </svg>
            <span>닫기</span>
          </button>
        </div>
        <div class="settings-fields">
          <label>현재 비밀번호<input id="currentPassword" type="password" autocomplete="current-password" required></label>
          <label>새 비밀번호<input id="newPassword" type="password" autocomplete="new-password" minlength="8" required></label>
          <label>새 비밀번호 확인<input id="confirmPassword" type="password" autocomplete="new-password" minlength="8" required></label>
        </div>
        <div class="button-row settings-actions">
          <button class="icon-button text-button primary" type="submit">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z"></path>
              <path d="M17 21v-8H7v8M7 3v5h8"></path>
            </svg>
            변경 저장
          </button>
          <button class="icon-button text-button subtle" id="settingsCancelBtn" type="button">취소</button>
          <button class="icon-button text-button warning" id="logoutBtn" type="button">로그아웃</button>
        </div>
      </form>
    </div>
    <div id="toast" class="toast" role="status"></div>
    <script src="./member-details.js?v=member-details-4"></script>
    <script src="./app.js?v=mobile-visit-1"></script>
  </body>
</html>
