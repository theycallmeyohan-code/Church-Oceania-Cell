<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>남아메리카 공동체 교구관리</title>
    <link rel="stylesheet" href="./styles.css?v=lunar-marker-1">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">남아메리카 공동체</p>
          <h1>교구관리</h1>
        </div>
        <div class="top-actions">
          <label class="search-box">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="m21 21-4.3-4.3m1.3-5.2a6.5 6.5 0 1 1-13 0 6.5 6.5 0 0 1 13 0Z"></path>
            </svg>
            <input id="searchInput" type="search" placeholder="전체 검색: 이름, 전화, 자녀, 가족메모">
          </label>
          <button class="icon-button text-button primary" id="addMemberBtn" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 5v14M5 12h14"></path>
            </svg>
            새 성도
          </button>
        </div>
      </header>

      <main class="workspace">
        <aside class="cell-rail">
          <div class="rail-title">셀</div>
          <div id="cellTabs" class="cell-tabs"></div>
          <label class="archive-toggle">
            <input id="showArchived" type="checkbox">
            <span>보관 포함</span>
          </label>
        </aside>

        <section class="sheet">
          <div class="sheet-head">
            <div>
              <p id="cellMeta" class="cell-meta"></p>
              <h2 id="cellTitle"></h2>
            </div>
            <div class="sheet-stats">
              <span id="activeCount">0명</span>
              <span id="archivedCount">보관 0명</span>
            </div>
          </div>
          <div id="memberGrid" class="member-grid"></div>
        </section>

        <aside class="detail-panel" id="detailPanel" aria-live="polite">
          <div class="empty-detail" id="emptyDetail">
            <div class="empty-mark">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M20 21a8 8 0 0 0-16 0"></path>
                <circle cx="12" cy="7" r="4"></circle>
              </svg>
            </div>
            <p>성도를 선택하세요</p>
          </div>

          <form id="memberForm" class="member-form hidden">
            <div class="panel-head">
              <div class="panel-title">
                <p id="formMode" class="hidden-title">상세</p>
                <h3 id="formTitle" class="hidden-title">성도 정보</h3>
                <label class="icon-button photo-button photo-change-button" title="사진 추가/수정" aria-label="사진 추가/수정">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <rect x="3" y="5" width="18" height="14" rx="2"></rect>
                    <circle cx="8.5" cy="10.5" r="1.5"></circle>
                    <path d="m21 15-4.5-4.5L5 19"></path>
                  </svg>
                  <span>사진 추가/수정</span>
                  <input id="photoInput" type="file" accept="image/*">
                </label>
              </div>
              <button class="icon-button text-button subtle" id="closePanelBtn" type="button" title="닫기" aria-label="닫기">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M18 6 6 18M6 6l12 12"></path>
                </svg>
                <span>닫기</span>
              </button>
            </div>

            <div class="portrait-editor">
              <div id="photoPreview" class="portrait large"></div>
              <div class="identity-grid">
                <label>이름<input id="memberName" required></label>
                <label>직분<input id="memberTitle"></label>
                <label>셀<select id="memberCell"></select></label>
                <label>역할<select id="memberRole"></select></label>
                <label class="wide">교회등록일<input id="memberRegisteredAt" type="date"></label>
              </div>
            </div>

            <div class="form-grid">
              <label>전화<input id="memberPhone" inputmode="tel"></label>
              <label>집전화<input id="memberHomePhone" inputmode="tel"></label>
              <label>생년월일<input id="memberBirth" type="date"></label>
              <label class="age-field">나이
                <div class="age-with-calendar">
                  <input id="memberAge" class="age-output" readonly tabindex="-1">
                  <span id="memberCalendar" class="calendar-badge hidden">음력</span>
                </div>
              </label>
              <label class="wide">주소<input id="memberAddress"></label>
              <label class="wide">가족/메모<textarea id="memberMemo" rows="3"></textarea></label>
            </div>

            <div class="button-row">
              <button class="icon-button text-button primary" type="submit">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z"></path>
                  <path d="M17 21v-8H7v8M7 3v5h8"></path>
                </svg>
                저장
              </button>
              <button class="icon-button text-button warning" id="archiveBtn" type="button">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M21 8H3l2-4h14l2 4ZM5 8v11h14V8M10 12h4"></path>
                </svg>
                보관
              </button>
              <button class="icon-button text-button subtle hidden" id="restoreBtn" type="button">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M3 12a9 9 0 1 0 3-6.7M3 4v6h6"></path>
                </svg>
                복구
              </button>
              <button class="icon-button text-button danger" id="deleteBtn" type="button">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M3 6h18M8 6V4h8v2m-9 0 1 14h8l1-14"></path>
                </svg>
                완전 삭제
              </button>
            </div>

            <section class="visit-section">
              <div class="section-head">
                <h4>심방내역</h4>
                <span id="visitCount">0건</span>
              </div>
              <div class="visit-entry">
                <input id="visitDate" type="date">
                <select id="visitType">
                  <option>전화</option>
                  <option>심방</option>
                  <option>상담</option>
                  <option>기도</option>
                </select>
                <textarea id="visitSummary" rows="3" placeholder="요약"></textarea>
                <input id="visitPrayer" placeholder="기도제목">
                <input id="visitAction" placeholder="후속 조치">
                <button class="icon-button text-button" id="addVisitBtn" type="button">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 5v14M5 12h14"></path>
                  </svg>
                  추가
                </button>
              </div>
              <div id="visitList" class="visit-list"></div>
            </section>
          </form>
        </aside>
      </main>
    </div>

    <div id="toast" class="toast" role="status"></div>
    <script src="./member-details.js?v=member-details-4"></script>
    <script src="./app.js?v=registration-date-1"></script>
  </body>
</html>
